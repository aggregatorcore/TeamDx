name: tvf_dx_mobile
description: TVF DX Mobile App for SIM-based call tracking
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & WebSocket
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Device Info
  device_info_plus: ^9.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  
  # Audio Recording & Playback
  record: ^5.1.2
  audioplayers: ^5.2.1
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  record_linux: ^1.2.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
