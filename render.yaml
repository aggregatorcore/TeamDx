# Render Blueprint: TVF DX — Backend + Frontend
# Deploy: Connect repo in Render Dashboard, then use "New > Blueprint" and point to this file.
# Or create two Web Services manually (see docs/RENDER_DEPLOY.md).

services:
  # ---------- 1. Backend API (Express) ----------
  - type: web
    name: tvf-dx-api
    runtime: node
    region: singapore
    plan: free

    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:server

    envVars:
      - key: NODE_ENV
        value: production
      # Force IPv4 for DNS (Render has no IPv6; Supabase can resolve to IPv6 → ENETUNREACH)
      - key: NODE_OPTIONS
        value: --dns-result-order=ipv4first
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ---------- 2. Frontend (Next.js) ----------
  - type: web
    name: tvf-dx-web
    runtime: node
    region: singapore
    plan: free

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      # Set NEXT_PUBLIC_API_URL to your backend URL after deploy, e.g. https://tvf-dx-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
